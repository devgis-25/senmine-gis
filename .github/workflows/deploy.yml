name: SenMine GIS — CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── JOB 1 : Tests et vérifications ──────────────────────────
  test:
    name: Tests Django
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_DB: senmine_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev libproj-dev

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt

      - name: Run Django system check
        working-directory: backend
        env:
          SECRET_KEY: django-insecure-g*#30w6keha=a352c7hoe3mfvcie719tjt#ne*k0xag@+%2b&+
          DEBUG: 'True'
          DB_NAME: senmine_test
          DB_USER: postgres
          DB_PASSWORD: testpassword
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          python manage.py check

      - name: Run migrations
        working-directory: backend
        env:
          SECRET_KEY: test-secret-key-ci
          DEBUG: 'True'
          DB_NAME: senmine_test
          DB_USER: postgres
          DB_PASSWORD: testpassword
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          python manage.py migrate

  # ── JOB 2 : Déploiement Railway ──────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --detach